<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake | Neon Edition</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/snake-favicon.png" sizes="96x96" />
    <meta name="description" content="A modern neon-styled Snake game with customizable settings and power-ups">
</head>
<body>
    <button id="settings-button" aria-label="Game Settings">Settings</button>
    
    <main>
        <div id="start-screen" role="dialog" aria-modal="true" aria-labelledby="start-title">
            <div class="customization-form">
                <h2 id="start-title">Welcome to Snake!</h2>
                <p class="form-subtitle">Customize your game experience</p>
                
                <div class="customization-option">
                    <label for="snake-color">Snake Color</label>
                    <input type="color" id="snake-color" name="snake-color" value="#00FF00" aria-label="Choose snake color">
                </div>
                
                <div class="customization-option">
                    <label for="game-speed">Game Speed</label>
                    <select id="game-speed" aria-label="Select game speed">
                        <option value="150">Slow</option>
                        <option value="120" selected>Normal</option>
                        <option value="90">Fast</option>
                    </select>
                </div>
                
                <div class="customization-option">
                    <label for="grid-size">Grid Size</label>
                    <select id="grid-size" aria-label="Select grid size">
                        <option value="20">20x20</option>
                        <option value="25">25x25</option>
                    </select>
                </div>
                
                <div class="customization-option">
                    <label for="food-color">Food Color</label>
                    <input type="color" id="food-color" name="food-color" value="#FF0000" aria-label="Choose food color">
                </div>
                
                <div class="customization-option">
                    <label for="game-style">Game Style</label>
                    <select id="game-style" aria-label="Select game style">
                        <option value="classic">Classic</option>
                        <option value="modern">Modern</option>
                        <option value="retro">Retro</option>
                    </select>
                </div>
                
                <button id="start-button">Start Game</button>
            </div>
        </div>
        
        <div id="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settings-title">
            <div class="customization-form">
                <h2 id="settings-title">Game Settings</h2>
                <p class="form-subtitle">Adjust your preferences</p>
                
                <div class="customization-option">
                    <label for="settings-snake-color">Snake Color</label>
                    <input type="color" id="settings-snake-color" name="settings-snake-color" value="#00FF00" aria-label="Choose snake color">
                </div>
                
                <div class="customization-option">
                    <label for="settings-game-speed">Game Speed</label>
                    <select id="settings-game-speed" aria-label="Select game speed">
                        <option value="150">Slow</option>
                        <option value="120" selected>Normal</option>
                        <option value="90">Fast</option>
                    </select>
                </div>
                
                <div class="customization-option">
                    <label for="settings-grid-size">Grid Size</label>
                    <select id="settings-grid-size" aria-label="Select grid size">
                        <option value="20">20x20</option>
                        <option value="25">25x25</option>
                    </select>
                </div>
                
                <div class="customization-option">
                    <label for="settings-food-color">Food Color</label>
                    <input type="color" id="settings-food-color" name="settings-food-color" value="#FF0000" aria-label="Choose food color">
                </div>
                
                <div class="customization-option">
                    <label for="settings-game-style">Game Style</label>
                    <select id="settings-game-style" aria-label="Select game style">
                        <option value="classic">Classic</option>
                        <option value="modern">Modern</option>
                        <option value="retro">Retro</option>
                    </select>
                </div>
                
                <div class="button-group">
                    <button id="apply-settings-button">Apply Settings</button>
                    <button id="close-settings-button">Close</button>
                </div>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="400" height="400" aria-label="Snake game canvas" role="img"></canvas>
        
        <div class="game-info">
            <div id="score" class="score-display">Score: 0</div>
            <div id="high-score" class="high-score-display">High Score: 0</div>
        </div>
        
        <div id="powerup-message" class="powerup-message" aria-live="polite"></div>
        
        <div id="game-over-screen" role="dialog" aria-modal="true" aria-labelledby="game-over-title">
            <div>
                <h2 id="game-over-title">Game Over</h2>
                <p id="game-over-score" class="game-over-text">Your Score: 0</p>
                <p id="game-over-high-score" class="game-over-text">High Score: 0</p>
                <div class="button-group">
                    <button id="restart-button">Restart</button>
                    <button id="game-over-settings-button" class="settings-btn">Settings</button>
                </div>
            </div>
        </div>
        
        <div id="pause-screen" role="dialog" aria-modal="true" aria-labelledby="pause-title">
            <div>
                <h2 id="pause-title">Game Paused</h2>
                <p class="pause-hint">Press P or click Continue to resume</p>
                <button id="continue-button">Continue</button>
            </div>
        </div>
    </main>
    
    <footer>
        <p>Created by Oli | Press P to pause | Arrow keys or WASD to move</p>
    </footer>

    <svg xmlns="http://www.w3.org/2000/svg" version="1.1" style="display: none;" aria-hidden="true">
        <filter id="pixelate">
            <feFlood x="4" y="4" height="10" width="10" flood-color="white" result="pixelation"/>
            <feComposite in="SourceGraphic" in2="pixelation" operator="in"/>
        </filter>
    </svg>

    <script src="script.js"></script>
</body>
</html>
